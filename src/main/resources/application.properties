# ─── Application ────────────────────────────────────────────
quarkus.application.name=ecommerce-api
quarkus.application.version=1.0.0
quarkus.http.port=8080

# ─── Database (base — sobreescrita por perfil) ───────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ecommerce
quarkus.datasource.password=ecommerce123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/ecommerce_db

# ─── Hibernate ──────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=update

# ─── OpenAPI / Swagger ──────────────────────────────────────
quarkus.smallrye-openapi.info-title=Ecommerce API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for e-commerce built with Quarkus and PostgreSQL
quarkus.smallrye-openapi.info-contact-name=Michael
quarkus.smallrye-openapi.info-contact-url=https://github.com/Michael-2405
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ─── Profile: dev ───────────────────────────────────────────
# SQL visible en consola para debugging
%dev.quarkus.hibernate-orm.log.sql=true
# Swagger siempre disponible en dev
%dev.quarkus.swagger-ui.always-include=true
# Logs detallados en dev
%dev.quarkus.log.level=DEBUG
%dev.quarkus.log.category."com.michael.ecommerce".level=DEBUG

# ─── Profile: prod ──────────────────────────────────────────
# Nunca modificar schema automáticamente en producción
%prod.quarkus.hibernate-orm.database.generation=none
# Sin SQL en consola — performance y seguridad
%prod.quarkus.hibernate-orm.log.sql=false
# Swagger deshabilitado en producción
%prod.quarkus.swagger-ui.always-include=false
# Solo logs de nivel WARNING en prod
%prod.quarkus.log.level=WARNING
%prod.quarkus.log.category."com.michael.ecommerce".level=INFO
# Datasource apunta a host de producción (variable de entorno)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://db:5435/ecommerce_db
